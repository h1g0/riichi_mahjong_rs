# fly.toml app configuration file generated for riichi-mahjong-rs on 2026-06-13T18:53:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riichi-mahjong-rs'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # ルームはメモリ上にあり、マシンをまたいで共有されない。複数マシンや
  # autostop による切り替えが起きると、接続先とルームのあるマシンが一致せず
  # 接続が切れる。必ず単一マシンを常時起動すること。
  # デプロイ後に一度だけ `fly scale count 1` でマシン数を 1 にする。
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
