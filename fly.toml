# Fly.io デプロイ設定（mahjong-net-server）
#
# `fly launch` で生成・調整できる雛形。app 名は自分のものに変更すること。
# 詳細な手順は README の「Deployment」を参照。

app = "mahjong-rs-server"       # ← 自分のアプリ名に変更する
primary_region = "nrt"          # 東京（必要に応じて変更）

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true            # http を https にリダイレクトし wss を強制する
  # ルームはメモリ上にあり、マシンをまたいで共有されない。複数マシンや
  # autostop による切り替えが起きると、接続先とルームのあるマシンが一致せず
  # 接続が切れる。必ず単一マシンを常時起動すること。
  # デプロイ後に一度だけ `fly scale count 1` でマシン数を 1 にする。
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
