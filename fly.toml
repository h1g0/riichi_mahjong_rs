# fly.toml app configuration file generated for riichi-mahjong-rs on 2026-06-13T18:53:47Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'riichi-mahjong-rs'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  # ルームはメモリ上にあり、マシンをまたいで共有されない。必ず単一マシンで
  # 運用すること（デプロイ後に一度だけ `fly scale count 1` でマシン数を 1 にする）。
  # 1台であれば autostop で停止しても同じ1台が起動するため、ルームの不整合は
  # 起きない。遊んでいない時間はマシンを止めて課金を抑える（久々の初回接続は
  # 数秒のコールドスタートが入る）。複数マシンには絶対にスケールしないこと。
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '5s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
